services:
  api:
    volumes:
      - ./Backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      target: build
    # Overwrite the command to run Vite's hot-reloading dev server
    command: npm run dev -- --host 0.0.0.0 --port 3000
    ports:
      - "127.0.0.1:8082:3000"
    volumes:
      # Mount the local directory for hot reloading
      - ./Frontend:/app
      # Exclude node_modules so local and container packages don't conflict
      - /app/node_modules
    env_file:
      - ./Frontend/.env.development
    environment:
      - NODE_ENV=development
      - VITE_USE_POLLING=true
    restart: no
