name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend setup & validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: Backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff, non-strict)
        run: ruff check app tests || true

      - name: Test
        run: pytest -q
        env:
          ENV: development
          MONGO_URL: mongodb://localhost:27017
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: ci-test-secret-not-for-production
          REFRESH_SECRET_KEY: ci-test-refresh-secret-not-for-production

  frontend:
    name: Frontend setup, build & validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install
        run: npm ci
        env:
          HUSKY: "0"

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://example.com/api/v1
          VITE_APP_NAME: MyChair
