# Render Blueprint — MyChair monorepo (API via Docker / Python 3.11)
# Schema: https://render.com/schema/render.yaml.json
#
# Deploy from repo root. rootDir points at the standalone backend package.
# Set sync: false secrets in the Render dashboard before first production deploy.

services:
  - type: web
    name: mychair-api
    runtime: docker
    rootDir: mychair-backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 8000
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: Mychair
      - key: REDIS_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REFRESH_SECRET_KEY
        sync: false
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_PUBLIC_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_TEST_EMAIL
        sync: false
      - key: SYSTEM_ADMIN_EMAIL
        sync: false
      - key: SYSTEM_ADMIN_PASSWORD
        sync: false
      - key: INVITATION_TOKEN_EXPIRE_HOURS
        value: "72"
