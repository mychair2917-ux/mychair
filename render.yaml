# Render Infrastructure-as-Code (Blueprint) Configuration
# Schema Reference: https://render.com/schema/render.yaml.json
#
# POST-DEPLOY VERIFICATION (required):
#   1. Compare startup logs on API and worker — JWT fingerprint must MATCH.
#   2. curl https://<api>/health/deep — both mongodb and redis must be "ok".
#   3. MONGO_URL is set once on mychair-shared group (shared by API + worker).

envVarGroups:
  - name: mychair-shared
    envVars:
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_SECRET_KEY
        generateValue: true

services:
  # 1. Managed Redis (Key Value Store) — deploy FIRST
  - type: keyvalue
    name: mychair-redis
    plan: free
    ipAllowList: []

  # 2. FastAPI Backend API (Web Service)
  - type: web
    name: mychair-api
    runtime: docker
    dockerfilePath: Backend/Dockerfile
    dockerContext: Backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: PORT
        value: 8000
      - fromGroup: mychair-shared
      - key: MONGODB_DB_NAME
        value: Mychair
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: mychair-redis
          property: connectionString
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_PUBLIC_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: MyChair <onboarding@resend.dev>
      - key: RESEND_TEST_EMAIL
        value: my.chair2917@gmail.com
      - key: INVITATION_TOKEN_EXPIRE_HOURS
        value: "72"
      - key: SYSTEM_ADMIN_EMAIL
        value: mychair2918@gmail.com
      - key: SYSTEM_ADMIN_PASSWORD
        value: Tudip@123

  # 3. ARQ Background Worker (Worker Service) — deploy AFTER Redis + API
  - type: worker
    name: mychair-worker
    runtime: docker
    dockerfilePath: Backend/Dockerfile
    dockerContext: Backend
    dockerCommand: python -m app.workers.run_worker
    plan: starter
    envVars:
      - key: ENV
        value: production
      - fromGroup: mychair-shared
      - key: MONGODB_DB_NAME
        value: Mychair
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: mychair-redis
          property: connectionString
