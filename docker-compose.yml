services:
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: mychair_frontend
    ports:
      - "127.0.0.1:8083:80"
    restart: always
    depends_on:
      - api
    networks:
      - mychair_network

  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: mychair_api
    ports:
      - "8000:8000"
    env_file:
      - ./Backend/.env
    environment:
      - ENV=development
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB_NAME=Mychair
      - REDIS_URI=redis://redis:6379/0
      - SECRET_KEY=PROD_SUPER_SECRET_KEY_FOR_SALON_ERP_CHANGEME
      # Email (Resend) — loaded from Backend/.env via env_file above; do not override here
      - BACKEND_PUBLIC_URL=${BACKEND_PUBLIC_URL:-http://localhost:8000}
    depends_on:
      - mongodb
      - redis
    restart: always
    networks:
      - mychair_network

  worker:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: mychair_worker
    command: python -m app.workers.run_worker
    environment:
      - ENV=development
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB_NAME=Mychair
      - REDIS_URI=redis://redis:6379/0
      - SECRET_KEY=PROD_SUPER_SECRET_KEY_FOR_SALON_ERP_CHANGEME
    depends_on:
      - mongodb
      - redis
    restart: always
    networks:
      - mychair_network

  mongodb:
    image: mongo:6.0
    container_name: mychair_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always
    networks:
      - mychair_network

  redis:
    image: redis:alpine
    container_name: mychair_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - mychair_network

volumes:
  mongodb_data:
  redis_data:

networks:
  mychair_network:
    driver: bridge
