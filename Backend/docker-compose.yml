version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENV=development
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB_NAME=Mychair
      - REDIS_URI=redis://redis:6379/0
      - SECRET_KEY=PROD_SUPER_SECRET_KEY_FOR_SALON_ERP_CHANGEME
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8082}
    depends_on:
      - mongodb
      - redis
    restart: always

  worker:
    build: .
    command: python -m app.workers.run_worker
    environment:
      - ENV=development
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB_NAME=Mychair
      - REDIS_URI=redis://redis:6379/0
      - SECRET_KEY=PROD_SUPER_SECRET_KEY_FOR_SALON_ERP_CHANGEME
    depends_on:
      - mongodb
      - redis
    restart: always

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  mongodb_data:
  redis_data:
